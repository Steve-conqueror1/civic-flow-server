version: "3.9"

services:
  app:
    build: .
    container_name: civicflow-app
    ports:
      - "${APP_PORT}:5001"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - civicflow-network

  redis:
    image: redis:7-alpine
    container_name: civicflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - civicflow-network

volumes:
  redis-data:

networks:
  civicflow-network:
    name: civicflow-network
    driver: bridge
